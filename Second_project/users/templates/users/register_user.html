<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f8ff;
        }
        .form-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .hint-block {
          display: none; /* по умолчанию скрыт */
          margin-top: 1rem;
          padding: 0.8rem;
          background-color: #e7f3ff;
          border: 1px solid #b8daff;
          border-radius: 0.375rem;
        }
        /* 🔹 Выравнивание кнопок по высоте */
        .btn-form {
            height: calc(1.5em + 0.75rem + 2px); /* как у input */
        }
    </style>
</head>
<body>
<div class="container mt-5 form-container">
    <h1 class="mb-4">Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        <div class="mb-3">
            <label class="form-label">{{ form.username.label }}</label>
            <input type="text" name="{{ form.username.name }}" class="form-control" value="{{ form.username.value|default:'' }}">
            {{ form.username.errors }}
        </div>
        <div class="mb-3">
            <label class="form-label">{{ form.password1.label }}</label>
            <input type="password" name="{{ form.password1.name }}" class="form-control"/>
            {{ form.password1.errors }}
        </div>
        <div class="mb-3">
            <label class="form-label">{{ form.password2.label }}</label>
            <input type="password" name="{{ form.password2.name }}" class="form-control"/>
            {{ form.password2.errors }}
        </div>
        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary btn-form">Зарегистрироваться</button>
            <div>
              <a href="{% url 'users:login_user' %}?next={{ request.GET.next }}"
                 class="btn btn-outline-secondary me-2 btn-form">Войти</a>
              <a href="{{ request.GET.next|default:'/' }}" class="btn btn-secondary btn-form">Назад</a>
            </div>
        </div>
    </form>
    <!-- Добавляем кнопку "Уже есть аккаунт?" -->
    <div class="mt-3 text-center">
      <button class="btn btn-link" onclick="toggleHint()">Уже есть аккаунт?</button>
    </div>

    <!-- Блок с подсказкой -->
    <div id="hintBlock" class="hint-block">
      <p>Если у вас уже есть аккаунт, нажмите <strong>"Войти"</strong> выше.</p>
      <p>Войдя в систему, вы сможете оставлять отзывы и пользоваться другими возможностями сайта.</p>
    </div>
</div>

<script>
  function toggleHint() {
    const hintBlock = document.getElementById('hintBlock');
    // Показываем/скрываем блок
    hintBlock.style.display = hintBlock.style.display === 'none' ? 'block' : 'none';
  }
</script>

</body>
</html>
