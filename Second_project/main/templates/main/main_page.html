<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% include 'main/includes/main_navbar.html' %}

    <div class="container">
        <h1 class="text-center mb-5">Выберите приложение</h1>
        <div class="row">
            <!-- Гороскоп -->
            <div class="col-md-4 mb-4">
                <a href="{% url 'horoscope:home_horoscope' %}" class="card text-decoration-none text-dark h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">🔮 Гороскоп</h5>
                        <p class="card-text">Узнайте своё будущее</p>
                    </div>
                </a>
            </div>

            <!-- Блог -->
            <div class="col-md-4 mb-4">
                <a href="{% url 'blog:home' %}" class="card text-decoration-none text-dark h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">📝 Блог</h5>
                        <p class="card-text">Читайте и пишите посты</p>
                    </div>
                </a>
            </div>

            <!-- Фильмы -->
            <div class="col-md-4 mb-4">
                <a href="{% url 'movie:movie_app_home_page' %}" class="card text-decoration-none text-dark h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">🎬 Фильмы</h5>
                        <p class="card-text">Смотрите лучшие фильмы</p>
                    </div>
                </a>
            </div>

            <!-- Обратная связь -->
            <div class="col-md-4 mb-4">
                <a href="{% url 'feedback:home' %}" class="card text-decoration-none text-dark h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">💬 Обратная связь</h5>
                        <p class="card-text">Напишите нам</p>
                    </div>
                </a>
            </div>

            <!-- ToDo лист -->
            <div class="col-md-4 mb-4">
                <a href="{% url 'todo:to_do_home' %}" class="card text-decoration-none text-dark h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">✅ ToDo лист</h5>
                        <p class="card-text">Управляйте своими задачами</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
